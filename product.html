<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تفاصيل المنتج</title>
    <style>
      body {
        font-family: "Tajawal", sans-serif;
        direction: rtl;
        padding: 20px;
        background: #f9fafc;
      }
      .container {
        max-width: 800px;
        margin: auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .image {
        width: 100%;
        height: 350px;
        object-fit: cover;
        background: #eee;
      }
      .content {
        padding: 20px;
      }
      .name {
        font-size: 1.5rem;
        font-weight: bold;
        color: #0d6efd;
        margin-bottom: 10px;
      }
      .info {
        font-size: 1rem;
        margin: 5px 0;
        color: #333;
      }
      .images-gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }
      .images-gallery img {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 8px;
        border: 2px solid #eee;
        cursor: pointer;
        transition: 0.3s;
      }
      .images-gallery img:hover {
        transform: scale(1.1);
      }
      .back {
        display: inline-block;
        margin-top: 20px;
        background: #0d6efd;
        color: white;
        padding: 10px 20px;
        border-radius: 6px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container" id="product-container">
      <p>جارٍ تحميل المنتج...</p>
    </div>

    <script>
      const apiBase = "https://api.45botique.com/api/products"; // رابط API الصحيح
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get("slug");

      if (!slug) {
        document.getElementById("product-container").innerHTML =
          "<p>لم يتم تحديد المنتج.</p>";
      } else {
        fetchProduct(slug);
      }

      async function fetchProduct(slug) {
        try {
          const res = await fetch(`${apiBase}/${slug}`);
          const data = await res.json();
          if (data.status !== "success") {
            document.getElementById(
              "product-container"
            ).innerHTML = `<p>${data.message}</p>`;
            return;
          }
          displayProduct(data.data);
        } catch (err) {
          document.getElementById("product-container").innerHTML =
            "<p>حدث خطأ أثناء تحميل المنتج.</p>";
        }
      }

      function displayProduct(product) {
        const container = document.getElementById("product-container");
        const gallery = (product.media_images || [])
          .map((img) => `<img src="${img.image}" alt="${product.name}">`)
          .join("");
        container.innerHTML = `
    <img src="${product.image}" alt="${product.name}" class="image">
    <div class="content">
      <div class="name">${product.name}</div>
      <div class="info">رقم الصنف: ${product.sku}</div>
      <div class="info">الباركود: ${product.barcode}</div>
      ${
        product.description
          ? `<div class="info">الوصف: ${product.description}</div>`
          : ""
      }
      <div class="images-gallery">${gallery}</div>
      <a href="index.html" class="back">⬅ رجوع إلى القائمة</a>
    </div>
  `;
      }
    </script>
  </body>
</html>
