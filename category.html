<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأقسام</title>
  <style>
    body {
      font-family: "Tajawal", sans-serif;
      background-color: #f8fafc;
      color: #222;
      margin: 0;
      padding: 20px;
      direction: rtl;
      text-align: right;
    }

    h1 {
      text-align: center;
      color: #0d6efd;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    ul.categories {
      list-style: none;
      padding-left: 0;
    }

    ul.categories li {
      background: #fff;
      margin-bottom: 10px;
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    ul.categories li:hover {
      transform: translateY(-2px);
    }

    ul.categories li a {
      text-decoration: none;
      color: #0d6efd;
      font-weight: bold;
    }

    ul.categories li ul {
      margin-top: 5px;
      margin-right: 15px;
      list-style: disc;
    }

    ul.categories li ul li {
      background: #f0f0f0;
      padding: 5px 10px;
      border-radius: 6px;
      font-weight: normal;
      font-size: 0.95rem;
    }

    ul.categories li ul li a {
      color: #555;
      font-weight: normal;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📂 الأقسام</h1>
    <ul id="categories" class="categories"></ul>
  </div>

  <script>
    const apiBase = "https://api.45botique.com/api/categories"; // رابط API الأقسام
    let currentPage = 1;

    async function fetchCategories(page = 1) {
      try {
        const res = await fetch(`${apiBase}?page=${page}`);
        const data = await res.json();
        displayCategories(data.data);
      } catch (err) {
        console.error("API Error:", err);
        document.getElementById("categories").innerHTML = "<li>خطأ في تحميل الأقسام</li>";
      }
    }

    function displayCategories(categories) {
      const container = document.getElementById("categories");
      container.innerHTML = "";

      categories.forEach(cat => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="cat.html?slug=${encodeURIComponent(cat.slug)}">${cat.name}</a>`;

        if (cat.children && cat.children.length > 0) {
          const ulChildren = document.createElement("ul");
          cat.children.forEach(child => {
            const childLi = document.createElement("li");
            childLi.innerHTML = `<a href="cat.html?slug=${encodeURIComponent(child.slug)}">${child.name}</a>`;
            ulChildren.appendChild(childLi);
          });
          li.appendChild(ulChildren);
        }

        container.appendChild(li);
      });
    }

    // تحميل الأقسام عند فتح الصفحة
    fetchCategories();
  </script>
</body>
</html>
